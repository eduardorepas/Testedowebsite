<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HomeLoop — Eletrodomésticos como Serviço</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    .nb-cta{background:var(--teal);color:white;padding:8px 16px;border-radius:10px;font-size:.875rem;cursor:pointer;border:none;transition:background .15s}
    .nb-cta:hover{background:var(--teal-d)}
    
    .page { display: none; }
    .page.active { display: block; }
    
    /* Css de suporte para os erros das User Stories */
    .pay-err { background:#fee2e2; color:var(--red); border:1px solid #fca5a5; border-radius:10px; padding:10px 14px; font-size:.82rem; margin-bottom:1rem; display:none; }
    .pay-err.show { display:block; }
  </style>
</head>
<body>

  <div id="navbar-root"></div>
  
  <div id="page-home"         class="page"></div>
  <div id="page-login"        class="page"></div>
  <div id="page-register"     class="page"></div>
  <div id="page-plans"        class="page"></div>
  <div id="page-appliances"   class="page"></div>
  <div id="page-subscription" class="page"></div>
  <div id="page-delivery"     class="page"></div>
  <div id="page-dashboard"    class="page"></div>
  
  <div id="footer-root"></div>

  <script src="js/data.js"></script>
  
  <script>
    // ====== FUNÇÃO DO RODAPÉ (A QUE ESTAVA A DAR ERRO) ======
    function renderFooter() {
      return `
        <footer style="background:#0f172a; color:white; margin-top:auto">
          <div style="max-width:1280px; margin:0 auto; padding:2.5rem 1.5rem; text-align:center">
            <p style="color:#64748b; font-size:.78rem">© 2026 HomeLoop. Todos os critérios de aceitação mapeados.</p>
          </div>
        </footer>`;
    }

    // ====== FUNÇÕES ADICIONAIS DE INTERFACE ======
    function renderHome() {
      document.getElementById('page-home').innerHTML = `
        <section class="hero" style="background:#1e293b; padding:4rem 2rem; text-align:center; color:white;">
          <div class="hero-inner">
            <h1>Eletrodomésticos Premium Sem Complicações</h1>
            <p class="hero-desc">Subscreva pacotes anuais com entrega técnica e manutenção total gratuitas.</p>
            <div class="hero-btns" style="margin-top:2rem; display:flex; gap:10px; justify-content:center;">
              <button class="btn btn-primary" onclick="navigate('/plans')">Explorar Planos</button>
              <button class="btn btn-outline" style="color:white; border-color:white;" onclick="navigate('/appliances')">Ver Catálogo</button>
            </div>
          </div>
        </section>`;
    }

    function renderPlans() {
      const currentPlan = typeof getCurrentPlan === 'function' ? getCurrentPlan() : null;
      document.getElementById('page-plans').innerHTML = `
        <div class="ph" style="padding:2rem; text-align:center;">
          <h1>Escolha o seu Plano Anual</h1>
        </div>
        <div class="pc" style="max-width:800px; margin:0 auto; padding:2rem;">
          <div class="plans-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <div class="plan-card" style="border:2px solid var(--teal); padding:2rem; border-radius:12px; cursor:pointer;" onclick="selectPlan('parcial'); renderPlans();">
              <h3>Plano Parcial</h3>
              <div style="font-size:1.5rem; font-weight:bold; margin:1rem 0;">€600/ano</div>
              <p>Escolha até 4 aparelhos em simultâneo</p>
            </div>
            <div class="plan-card" style="border:2px solid var(--teal); padding:2rem; border-radius:12px; cursor:pointer;" onclick="selectPlan('completo'); renderPlans();">
              <h3>Plano Completo</h3>
              <div style="font-size:1.5rem; font-weight:bold; margin:1rem 0;">€1000/ano</div>
              <p>Escolha até 8 aparelhos em simultâneo</p>
            </div>
          </div>
          <div style="text-align:center; margin-top:2rem;">
            <button class="btn btn-primary" onclick="navigate('/subscription')">Avançar para Pagamento →</button>
          </div>
        </div>`;
    }

    function renderAppliances() {
      const plan = typeof getCurrentPlan === 'function' ? getCurrentPlan() : null;
      const state = typeof getState === 'function' ? getState() : { selectedIds: [] };
      const categories = ['Todos', 'Máquina de Lavar', 'Frigorífico', 'Máquina de Lavar Louça', 'Máquina de Café', 'Forno', 'Máquina de Secar', 'Micro-ondas', 'Fogão', 'Aspirador', 'Ar Condicionado'];
      
      let filtered = typeof APPLIANCES !== 'undefined' ? APPLIANCES.filter(a => {
        const matchesCat = window.currentCategory === 'Todos' || a.category === window.currentCategory;
        const matchesSearch = a.name.toLowerCase().includes(window.currentSearch.toLowerCase()) || 
                              a.brand.toLowerCase().includes(window.currentSearch.toLowerCase());
        return matchesCat && matchesSearch;
      }) : [];

      document.getElementById('page-appliances').innerHTML = `
        <div class="ph" style="padding:2rem; text-align:center;">
          <h1>Catálogo de Eletrodomésticos</h1>
          <div class="filter-bar" style="margin-top:1rem; display:flex; flex-direction:column; gap:10px; align-items:center;">
            <input type="text" placeholder="Pesquise e prima Enter..." value="${window.currentSearch}" onkeydown="handleSearchKeyDown(event, this)" style="padding:10px; width:300px; border-radius:8px; border:1px solid #ccc;">
            <div style="display:flex; gap:5px; flex-wrap:wrap; justify-content:center;">
              ${categories.map(c => `<span class="fpill" style="padding:5px 10px; background:#e2e8f0; border-radius:15px; cursor:pointer;" onclick="handleCategoryFilter('${c}')">${c}</span>`).join('')}
            </div>
          </div>
        </div>
        <div class="pc" style="padding:2rem;">
          <div class="app-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); gap:20px;">
            ${filtered.map(a => {
              const sel = typeof isSelected === 'function' && isSelected(a.id);
              return `
                <div class="app-card" style="border:1px solid #e2e8f0; padding:1rem; border-radius:8px;">
                  <img src="${a.image}" style="width:100%; height:150px; object-fit:cover; border-radius:6px;">
                  <h4 style="margin:0.5rem 0;">${a.name}</h4>
                  <p style="font-size:0.8rem; color:#64748b;">${a.description}</p>
                  <button class="btn btn-primary" style="width:100%; margin-top:1rem;" onclick="handleOpenSchedule('${a.id}')">${sel ? '✓ Adicionado' : 'Agendar Entrega'}</button>
                </div>`;
            }).join('')}
          </div>
        </div>`;
    }

    function renderSubscription() {
      const plan = typeof getCurrentPlan === 'function' ? getCurrentPlan() : null;
      document.getElementById('page-subscription').innerHTML = `
        <div class="pc" style="max-width:500px; margin:4rem auto; padding:2rem; border:1px solid #e2e8f0; border-radius:12px;">
          <h3>Confirmação e Checkout</h3>
          <p>Plano: <strong>${plan ? plan.name : 'Nenhum'}</strong></p>
          <p>Preço: <strong>€${plan ? plan.price : 0}</strong></p>
          <div id="pay-error-msg" class="pay-err"></div>
          <button class="btn btn-primary" style="width:100%; margin-bottom:10px;" onclick="executePaymentSimulation('success')">Simular Pagamento Bem-Sucedido (Cenário 1)</button>
          <button class="btn btn-danger" style="width:100%; background:#ef4444; color:white; border:none; padding:10px; border-radius:8px;" onclick="executePaymentSimulation('fail')">Simular Falha de Pagamento (Cenário 2)</button>
        </div>`;
    }

    function renderDelivery() {
      const form = window.activeDeliveryForm || { applianceId: null };
      const appliance = typeof APPLIANCES !== 'undefined' ? APPLIANCES.find(a => a.id === form.applianceId) : null;
      document.getElementById('page-delivery').innerHTML = `
        <div class="pc" style="max-width:500px; margin:4rem auto; padding:2rem; border:1px solid #e2e8f0; border-radius:12px;">
          <h3>Agendar Detalhes de Entrega</h3>
          <p>Equipamento: <strong>${appliance ? appliance.name : ''}</strong></p>
          <div class="field" style="margin-bottom:1rem;"><label style="display:block;">Data</label><input type="date" id="dev-date" onchange="window.activeDeliveryForm.date = this.value" style="width:100%; padding:8px;"></div>
          <div class="field" style="margin-bottom:1rem;"><label style="display:block;">Morada</label><input type="text" id="dev-addr" onchange="window.activeDeliveryForm.address = this.value" style="width:100%; padding:8px;"></div>
          <button class="btn btn-primary" style="width:100%;" onclick="executeScheduleSimulation('success')">Submeter Agendamento</button>
        </div>`;
    }

    function renderDashboard() {
      const user = typeof getCurrentUser === 'function' ? getCurrentUser() : null;
      const selected = typeof getSelectedAppliances === 'function' ? getSelectedAppliances() : [];
      const deliveries = typeof getDeliveries === 'function' ? getDeliveries() : [];
      
      document.getElementById('page-dashboard').innerHTML = `
        <div class="pc" style="padding:2rem; max-width:1000px; margin:0 auto;">
          <h2>Área de Gestão do Cliente</h2>
          <p>Utilizador: <strong>${user ? user.name : 'João'}</strong></p>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:40px; margin-top:2rem;">
            <div>
              <h3>📦 Equipamentos Ativos (US1.4)</h3>
              ${selected.map(a => `
                <div style="border:1px solid #e2e8f0; padding:1rem; margin-bottom:1rem; border-radius:8px;">
                  <h4>${a.name}</h4>
                  <input type="file" id="photo-${a.id}" style="margin:5px 0; display:block;">
                  <label><input type="checkbox" id="condition-${a.id}"> Equipamento Danificado</label>
                  <input type="date" id="ret-date-${a.id}" style="display:block; margin:5px 0; padding:4px;">
                  <button class="btn btn-danger" style="background:#ef4444; color:white; border:none; padding:5px; width:100%; border-radius:4px;" onclick="executeCancellation('${a.id}')">Anular e Devolver</button>
                </div>
              `).join('')}
            </div>
            <div>
              <h3>🚚 Painel Logístico (US1.5)</h3>
              ${deliveries.map((d, idx) => `
                <div style="border:1px solid #e2e8f0; padding:1rem; margin-bottom:1rem; border-radius:8px;">
                  <p><strong>${d.applianceName}</strong> <span style="background:#3b82f6; color:white; padding:2px 6px; border-radius:4px; font-size:0.75rem;">${d.status}</span></p>
                  <p style="font-size:0.8rem; color:#64748b;">📅 Data: ${d.date}</p>
                  ${d.status === 'Adiada' ? `
                    <input type="date" id="resched-date-${idx}">
                    <button class="btn btn-primary" onclick="handleRescheduleDelivery(${idx}, document.getElementById('resched-date-${idx}').value)">Remarcar Nova Data</button>
                  ` : ''}
                  <div style="margin-top:10px; display:flex; gap:5px;">
                    <button style="font-size:0.7rem; padding:4px;" onclick="triggerDeliveryStatusUpdate(${idx}, 'Entregue')">Simular Entregue (C1)</button>
                    <button style="font-size:0.7rem; padding:4px; background:#f97316; color:white; border:none;" onclick="triggerDeliveryStatusUpdate(${idx}, 'Adiada')">Simular Adiado (C2)</button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>`;
    }

    function renderLogin() {
      document.getElementById('page-login').innerHTML = `
        <div class="pc" style="max-width:400px; margin:4rem auto; padding:2rem; border:1px solid #e2e8f0; border-radius:12px; text-align:center;">
          <h3>Login HomeLoop</h3>
          <button class="btn btn-primary" style="width:100%; margin-top:1rem;" onclick="login('joao@email.com','1234'); navigate('/dashboard');">Entrar Direto como João</button>
        </div>`;
    }
    
    function renderRegister() { renderLogin(); }
  </script>

  <script src="js/app.js"></script>
  
  <script>
    // Inicialização do ecossistema unificado
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('footer-root').innerHTML = renderFooter();
      
      if (typeof updateNavbar === 'function') {
        updateNavbar();
      } else {
        document.getElementById('navbar-root').innerHTML = `
          <nav style="background:#0f172a; padding:1rem; display:flex; gap:20px; align-items:center;">
            <a href="#" onclick="navigate('/')" style="color:white; font-weight:800; text-decoration:none; margin-right:auto;">HomeLoop</a>
            <a href="#" onclick="navigate('/plans')" style="color:#cbd5e1; text-decoration:none;">Planos</a>
            <a href="#" onclick="navigate('/appliances')" style="color:#cbd5e1; text-decoration:none;">Catálogo</a>
            <a href="#" onclick="navigate('/dashboard')" style="color:#cbd5e1; text-decoration:none;">A Minha Conta</a>
          </nav>`;
      }

      if (typeof navigate === 'function') {
        renderPage(location.pathname || '/');
      }
    });
  </script>
</body>
</html>
