<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeLoop - Aluguer de Eletrodomésticos</title>
    <!-- Fonte utilizada no teu código original -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --teal: #14b8a6;
            --teal-d: #0f766e;
            --teal-l: #ccfbf1;
            --navy: #0f172a;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --red: #ef4444;
        }

        body {
            margin: 0;
            font-family: 'DM Sans', sans-serif;
            color: var(--navy);
            background-color: #ffffff;
        }

        /* Estilos Base da Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: white;
            border-bottom: 1px solid var(--gray-100);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            font-family: 'Sora', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--teal-d);
            cursor: pointer;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .nav-links button, .nav-links a {
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 500;
            color: var(--gray-600);
            text-decoration: none;
            font-size: 0.95rem;
        }
        .nav-links button:hover { color: var(--teal); }
        
        /* Gestão de Páginas do SPA */
        .page {
            display: none; /* Escondidas por defeito, o JS ativa-as */
        }
        .page.active {
            display: block !important;
        }

        /* Estilos Utilitários Globais (usados no teu código JS) */
        .pc { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        .ph { background: var(--gray-50); padding: 3rem 1.5rem; text-align: center; border-bottom: 1px solid var(--gray-100); }
        .ph-inner h1 { font-family: 'Sora', sans-serif; font-size: 2rem; margin: 0 0 0.5rem 0; }
        
        .card { background: white; border: 1px solid var(--gray-100); border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .p-4 { padding: 1rem; }
        .p-5 { padding: 1.25rem; }
        .p-6 { padding: 1.5rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-5 { margin-bottom: 1.25rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mt-3 { margin-top: 0.75rem; }
        
        .flex { display: flex; }
        .justify-between { justify-content: space-between; }
        .items-center { align-items: center; }
        .gap-2 { gap: 0.5rem; }
        .gap-3 { gap: 0.75rem; }
        .w-full { width: 100%; }
        
        .text-sm { font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }
        .text-gray { color: var(--gray-500); }
        .text-navy { color: var(--navy); }
        .text-teal { color: var(--teal); }
        .fw-600 { font-weight: 600; }
        .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .btn {
            font-family: 'DM Sans', sans-serif;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-align: center;
            display: inline-block;
        }
        .btn-primary { background: var(--teal); color: white; }
        .btn-primary:hover { background: var(--teal-d); }
        .btn-primary:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }
        .btn-outline { background: transparent; border: 1px solid var(--gray-200); color: var(--gray-600); }
        .btn-outline:hover { background: var(--gray-50); }

        .badge { padding: 4px 8px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; }
        .bg-teal { background: var(--teal-l); color: var(--teal-d); }

        /* Estruturas de Grelhas do teu JS */
        .plans-grid, .benefit-grid, .app-grid, .sub-grid, .del-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .plan-card { padding: 2rem; border: 2px solid var(--gray-100); border-radius: 20px; cursor: pointer; position: relative; }
        .plan-card.selected { border-color: var(--teal); background: var(--teal-l); }
        
        /* Banners informativos */
        .info-banner { padding: 1rem; border-radius: 12px; font-size: 0.875rem; margin-bottom: 1rem; }
        .info-teal { background: var(--teal-l); color: var(--teal-d); }
        .info-amber { background: #fef3c7; color: #92400e; }
        .info-blue { background: #e0f2fe; color: #0369a1; }

        /* Estilos do Calendário */
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .cal-dn { font-size: 0.75rem; font-weight: 600; color: var(--gray-400); padding: 4px 0; }
        .cal-day { padding: 10px 0; border-radius: 8px; background: none; border: none; cursor: pointer; font-size: 0.875rem; color: var(--navy); }
        .cal-day:hover:not(:disabled) { background: var(--gray-100); }
        .cal-day:disabled { color: var(--gray-200); cursor: not-allowed; }
        .cal-day.sel { background: var(--teal) !important; color: white !important; font-weight: 600; }
        
        /* Janelas Horárias */
        .ts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .ts-btn { padding: 12px; border: 1px solid var(--gray-200); border-radius: 10px; background: white; cursor: pointer; font-size: 0.85rem; }
        .ts-btn.sel { background: var(--teal-l); border-color: var(--teal); color: var(--teal-d); font-weight: 600; }

        /* Sticky Bar de Seleção */
        .sticky-bar { position: fixed; bottom: -100px; left: 0; right: 0; background: white; border-top: 1px solid var(--gray-200); padding: 1rem 2rem; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); transition: bottom 0.3s; z-index: 99; }
        .sticky-bar.show { bottom: 0; }
        .sticky-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }

        /* Campos de Formulário */
        .field { margin-bottom: 1rem; display: flex; flex-direction: column; gap: 6px; }
        .field label { font-size: 0.82rem; font-weight: 600; color: var(--gray-600); }
        .field input { padding: 12px; border: 1px solid var(--gray-200); border-radius: 10px; font-family: inherit; font-size: 0.9rem; }
        .field input:focus { outline: none; border-color: var(--teal); }

        /* Erros */
        .pay-err, .reg-err, .login-err { display: none; color: var(--red); background: #fee2e2; padding: 10px; border-radius: 8px; font-size: 0.82rem; margin-bottom: 1rem; }
        .pay-err.show, .reg-err.show, .login-err.show { display: block; }
    </style>
</head>
<body>

    <!-- BARRA DE NAVEGAÇÃO -->
    <nav class="navbar">
        <div class="logo" data-nav="/">HomeLoop</div>
        <div class="nav-links" id="nav-links-container">
            <!-- Gerado dinamicamente pelo updateNavbar() do seu sistema -->
            <button data-nav="/plans">Planos</button>
            <button data-nav="/appliances">Catálogo</button>
            <button data-nav="/login">Entrar</button>
            <button class="btn btn-primary" data-nav="/register" style="padding: 6px 16px; font-size: 0.85rem;">Registar</button>
        </div>
    </nav>

    <!-- CONTENTORES DAS PÁGINAS (ONDE O JAVASCRIPT EXUTA O INNERHTML) -->
    <div id="page-home" class="page"></div>
    <div id="page-register" class="page"></div>
    <div id="page-login" class="page"></div>
    <div id="page-plans" class="page"></div>
    <div id="page-appliances" class="page"></div>
    <div id="page-subscription" class="page"></div>
    <div id="page-payment" class="page"></div>
    <div id="page-delivery" class="page"></div>
    <div id="page-dashboard" class="page"></div>

    <!-- CARREGAMENTO DE LOGÍSTICA E SCRIPTS (ORDEM OBRIGATÓRIA) -->
    <script src="js/store.js"></script>
    <script src="js/pages.js"></script>
    <script src="js/app.js"></script>

    <!-- INICIALIZADOR DO SITE -->
    <script>
        // Função para atualizar os botões da barra de navegação dependendo de estar logado ou não
        window.updateNavbar = function() {
            const container = document.getElementById('nav-links-container');
            if (!container) return;

            const user = window.state && window.state.user;
            const selected = window.getSelectedAppliances ? window.getSelectedAppliances() : [];

            if (user) {
                container.innerHTML = `
                    <button data-nav="/plans">Planos</button>
                    <button data-nav="/appliances">Catálogo (${selected.length})</button>
                    <button data-nav="/dashboard" style="color: var(--teal); font-weight: 600;">O Meu Painel</button>
                    <button onclick="doLogoutAction()" style="color: var(--red);">Sair</button>
                `;
            } else {
                container.innerHTML = `
                    <button data-nav="/plans">Planos</button>
                    <button data-nav="/appliances">Catálogo</button>
                    <button data-nav="/login">Entrar</button>
                    <button class="btn btn-primary" data-nav="/register" style="padding: 6px 16px; font-size: 0.85rem;">Registar</button>
                `;
            }
        };

        // Arranca o router SPA apontando para a página principal logo que a árvore DOM estiver pronta
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof navigate === "function") {
                navigate('/');
            } else {
                console.error("Erro crítico: A função 'navigate' não foi carregada. Verifica o ficheiro js/app.js.");
            }
        });
    </script>
</body>
</html>
